# Ground Truth: Expected findings for each benchmark target
#
# Standards alignment:
#   - Vulnerability categories follow CamBench (MSR 2022) and CryptoAPI-Bench (IEEE SecDev 2019) taxonomy
#   - TLS scoring follows SSL Labs Rating Guide v2009r (Qualys)
#   - Test IDs map to OWASP WSTG v4.2 Chapter 9: Testing for Weak Cryptography
#   - CWE references from MITRE CWE database
#   - Phase 0+1 MVP suite is URL-scoped: it evaluates the explicitly supplied edge URL,
#     not cross-port neighborhood discovery across adjacent services.
#   - Randomness testing for later suites follows the small-sample Tier 1-3 method
#   - Output format follows CycloneDX CBOM v1.6
#
# Note: No established blackbox crypto inventory benchmark exists in the literature.
# CamBench and CryptoAPI-Bench target whitebox/static analysis. This benchmark
# adapts their vulnerability taxonomy to a blackbox observation context, which
# is itself a novel academic contribution (see Notion design doc §4.4).
#
# References:
#   [1] Schlichtig et al., "CamBench -- Cryptographic API Misuse Detection Tool Benchmark Suite", MSR 2022, arXiv:2204.06447
#   [2] Afrose et al., "CryptoAPI-Bench: A Comprehensive Benchmark on Java Cryptographic API Misuses", IEEE SecDev 2019
#   [3] Ami et al., "Why Crypto-detectors Fail: A Systematic Evaluation of Cryptographic Misuse Detection Techniques" (MASC taxonomy), USENIX Security 2022
#   [4] Qualys SSL Labs, "SSL Server Rating Guide", v2009r (2025)
#   [5] OWASP, "Web Security Testing Guide v4.2", Chapter 9: Testing for Weak Cryptography
#   [6] NIST SP 800-90B / small-sample entropy estimation references for later CH6 suites
#   [7] Boehm et al., "Cryptoscope: Analyzing cryptographic usages in modern software", arXiv:2503.19531 (uses CamBench)
#   [8] CryptoScope LLM, arXiv:2508.11599 (OWASP + CryptoAPI benchmark)

# ============================================================
# Benchmark suites
# ============================================================
benchmark_suites:
  phase01:
    name: "Phase 0+1 MVP"
    description: >
      URL-scoped benchmark for Recon (Phase 0) and Protocol Layer (Phase 1).
      The input is an explicit HTTPS edge URL. Scoring covers observations that
      should be obtainable directly from that URL: HTTP security headers,
      certificate properties, TLS protocol support, cipher suite posture, and
      PFS. It does NOT score broad adjacent-port discovery.
    phases: [0, 1]
    evaluation_mode: "url_scoped"
    assumptions:
      - "User supplies the explicit HTTPS edge URL to assess."
      - "Scoring is confined to data directly observable from that URL."
      - "Adjacent port discovery is not required for credit."
      - "The suite models authorized self-assessment of a service edge."
    non_goals:
      - "network neighborhood discovery"
      - "SSH discovery"
      - "OpenAPI discovery"
      - "app-layer crypto misuse detection"
      - "oracle / timing / randomness testing"
    request_budget:
      header_fetch_max: 2
      certificate_fetch_max: 2
      version_probe_max: 4
      cipher_probe_max: 8
      total_actions_recommended_max: 16
    required_capabilities:
      - "fetch_http_headers"
      - "fetch_certificate_chain"
      - "test_protocol_versions"
      - "enumerate_cipher_suites"
    optional_capabilities:
      - "test_downgrade_attack"
      - "test_pqc_support"
    release_gate:
      precision_min: 0.95
      recall_min: 0.90
      ssl_grade_accuracy_required: true
      negative_control_false_positives_allowed: 0
      repeated_runs_min: 10
    score_weights:
      tls_posture: 0.45
      no_hsts: 0.10
      weak_key_length: 0.15
      weak_signature_algorithm: 0.15
      negative_control_suppression: 0.15
    benchmark_ids:
      - BM-09
      - BM-11
      - BM-12
      - BM-13
    negative_control_ids:
      - NC-04
    recommended_base_url: "http://localhost:9000"
  phase02:
    name: "Phase 2 Discovery MVP"
    description: >
      Base-URL-scoped discovery benchmark for app-layer cryptography-relevant
      HTTP surfaces. The input is an authorized application base URL, not an
      individual endpoint. Scoring covers same-origin descriptor fetching,
      candidate extraction, and classification of crypto-relevant endpoints
      such as encryption, hashing, token issuance, JWT auth, and HMAC
      verification surfaces. It does NOT score vulnerability classification or
      active cryptographic probing.
    phases: [0, 2]
    evaluation_mode: "base_url_discovery"
    assumptions:
      - "User supplies the explicit base URL of their own service."
      - "Discovery stays on the same origin as the supplied base URL."
      - "Service index and/or OpenAPI-like descriptors are acceptable discovery sources."
      - "The suite models authorized self-assessment of an application surface."
    non_goals:
      - "TLS posture assessment"
      - "vulnerability classification"
      - "oracle / timing / randomness testing"
      - "adjacent-port neighborhood discovery"
    request_budget:
      descriptor_fetch_max: 4
      total_actions_recommended_max: 6
    required_capabilities:
      - "fetch_service_index"
      - "fetch_openapi_descriptor"
      - "extract_candidate_endpoints"
      - "classify_crypto_relevant_surfaces"
    optional_capabilities:
      - "crawl_html_docs"
      - "follow_same_origin_redirects"
    release_gate:
      precision_min: 0.95
      recall_min: 0.95
      negative_control_false_positives_allowed: 0
      repeated_runs_min: 10
      mean_time_to_first_relevant_seconds_max: 2.0
    score_weights:
      relevant_endpoint_recall: 0.55
      discovery_precision: 0.25
      negative_control_suppression: 0.10
      request_budget: 0.10
    target_ids:
      - D-01
      - D-02
      - D-03
      - D-04
      - D-05
      - D-06
      - D-07
      - D-08
      - D-09
      - D-10
      - D-11
      - D-12
      - D-13
    negative_control_ids:
      - D-NC-01
      - D-NC-02
      - D-NC-03
    recommended_base_url: "http://localhost:9000"

phase01_contract:
  spec_version: "1.0"
  spec_paths:
    suite_spec: "benchmarks/phase01-spec.md"
    scoring_spec: "benchmarks/phase01-scoring-spec.md"
    report_schema: "benchmarks/phase01-report.schema.json"
  suite_categories:
    - "WeakProtocolVersion"
    - "InsecureCipherSuite"
    - "NoPFS"
    - "NoHSTS"
    - "WeakKeyLength"
    - "WeakSignatureAlgorithm"
  input_contract:
    allowed_schemes: ["https"]
    canonicalization:
      lowercase_scheme_host: true
      default_https_port: 443
      normalize_empty_path_to_slash: true
      strip_query_for_target_identity: true
      strip_fragment: true
    redirect_policy:
      same_origin_max_hops: 1
      cross_origin_result: "inconclusive"
      scheme_change_result: "inconclusive"
    tls_policy:
      require_sni: true
      certificate_trust_required: false
      allow_self_signed_for_observation: true
  request_accounting:
    action_types:
      - "http_request"
      - "certificate_handshake"
      - "version_probe"
      - "cipher_probe"
      - "retry"
      - "redirect_follow"
    retry_policy:
      max_retries_per_action: 1
      count_retries_as_actions: true
  normalization:
    protocol_aliases:
      TLSv1: "TLSv1.0"
      TLS1.0: "TLSv1.0"
      TLS1.1: "TLSv1.1"
      TLS1.2: "TLSv1.2"
      TLS1.3: "TLSv1.3"
    cipher_family_aliases:
      RC4-SHA: "RC4-family"
      RC4-MD5: "RC4-family"
      DES-CBC3-SHA: "3DES-family"
      AES128-SHA: "static-RSA"
      AES256-SHA: "static-RSA"
      AES128-SHA256: "static-RSA"
      AES256-SHA256: "static-RSA"
      ECDHE-RSA-AES128-SHA: "ECDHE-RSA"
      ECDHE-RSA-AES256-SHA: "ECDHE-RSA"
      TLS_AES_128_GCM_SHA256: "TLSv1.3-AEAD"
      TLS_AES_256_GCM_SHA384: "TLSv1.3-AEAD"
      TLS_CHACHA20_POLY1305_SHA256: "TLSv1.3-AEAD"
    signature_algorithm_aliases:
      sha1WithRSA: "sha1WithRSAEncryption"
      sha1_rsa: "sha1WithRSAEncryption"
      sha256WithRSA: "sha256WithRSAEncryption"
      sha256_rsa: "sha256WithRSAEncryption"
    pfs_semantics:
      positive_when_any_non_pfs_suite_accepted: true
      acceptable_pfs_key_exchange_families: ["ECDHE", "DHE"]
      non_pfs_key_exchange_families: ["RSA", "static-RSA", "PSK", "SRP"]
  evidence_contract:
    common_required_keys:
      - "observation_ids"
      - "target_url"
      - "collected_via"
      - "captured_at"
    by_category:
      WeakProtocolVersion:
        - "supported_protocols"
        - "accepted_protocol"
      InsecureCipherSuite:
        - "accepted_suites"
        - "normalized_suite_families"
        - "representative_suite"
      NoPFS:
        - "accepted_suites"
        - "accepted_key_exchange_families"
        - "non_pfs_accepted"
      NoHSTS:
        - "response_headers"
        - "redirect_hops_followed"
      WeakKeyLength:
        - "certificate_position"
        - "key_type"
        - "key_length_bits"
      WeakSignatureAlgorithm:
        - "certificate_position"
        - "signature_algorithm"
  verdict_statuses:
    - "matched"
    - "missed"
    - "false_positive"
    - "duplicate_false_positive"
    - "true_negative"
    - "inconclusive"

phase02_contract:
  spec_version: "1.0"
  spec_paths:
    suite_spec: "benchmarks/phase02-spec.md"
    scoring_spec: "benchmarks/phase02-scoring-spec.md"
    report_schema: "benchmarks/phase02-report.schema.json"
  surface_kinds:
    - "encryption_oracle"
    - "hash_oracle"
    - "token_issuer"
    - "decryption_oracle"
    - "jwt_auth_surface"
    - "hmac_verifier"
  input_contract:
    allowed_schemes: ["http", "https"]
    canonicalization:
      lowercase_scheme_host: true
      default_http_port: 80
      default_https_port: 443
      normalize_empty_path_to_slash: true
      strip_query_for_target_identity: true
      strip_fragment: true
    redirect_policy:
      same_origin_max_hops: 1
      cross_origin_result: "inconclusive"
    discovery_sources:
      - "service_index"
      - "openapi"
    explicit_descriptor_fields:
      - "surface_kind"
      - "crypto_relevant"
      - "x-bbci-surface-kind"
      - "x-bbci-crypto-relevant"
    descriptor_paths:
      - "/"
      - "/openapi.json"
      - "/swagger.json"
  request_accounting:
    action_types:
      - "descriptor_fetch"
      - "retry"
      - "redirect_follow"
    retry_policy:
      max_retries_per_action: 1
      count_retries_as_actions: true
  normalization:
    method_normalization: "uppercase"
    same_origin_required: true
    dedupe_key:
      - "endpoint_url"
      - "surface_kind"
  evidence_contract:
    common_required_keys:
      - "observation_ids"
      - "base_url"
      - "collected_via"
      - "captured_at"
    discovery_required_keys:
      - "sources"
      - "endpoint_url"
      - "endpoint_path"
      - "methods"
      - "surface_kind"
      - "same_origin"
      - "classification_basis"
      - "source_urls"
  verdict_statuses:
    - "matched"
    - "missed"
    - "false_positive"
    - "duplicate_false_positive"
    - "true_negative"
    - "inconclusive"

