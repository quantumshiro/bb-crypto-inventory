# NC-04: Strong TLS configuration (negative control)

worker_processes 1;

events {
    worker_connections 64;
}

http {
    server {
        listen 9444 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/strong-server.crt;
        ssl_certificate_key /etc/nginx/certs/strong-server.key;

        # Strong: TLS 1.3 only
        ssl_protocols TLSv1.3;

        # Strong: Only AEAD cipher suites
        ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256';

        ssl_prefer_server_ciphers on;

        # HSTS enabled
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        ssl_stapling on;
        ssl_stapling_verify on;

        location / {
            proxy_pass http://vuln-app:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
