# BM-09: Intentionally WEAK TLS configuration
# DO NOT use in production!

worker_processes 1;

events {
    worker_connections 64;
}

http {
    # Weak TLS configuration for benchmarking
    server {
        listen 9443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/weak-server.crt;
        ssl_certificate_key /etc/nginx/certs/weak-server.key;
        ssl_conf_command Providers "default legacy";
        ssl_conf_command CipherString DEFAULT:@SECLEVEL=0;

        # VULNERABILITY: Allow old TLS versions
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;

        # VULNERABILITY: Include weak cipher suites, no PFS
        ssl_ciphers 'RC4-SHA:RC4-MD5:DES-CBC3-SHA:AES128-SHA:AES256-SHA:AES128-SHA256:AES256-SHA256:ECDHE-RSA-AES128-SHA:ECDHE-RSA-AES256-SHA:ALL:!aNULL:@SECLEVEL=0';

        # VULNERABILITY: Prefer server ciphers (allows weak negotiation)
        ssl_prefer_server_ciphers off;

        # VULNERABILITY: No HSTS
        # (intentionally omitted)

        # VULNERABILITY: Weak DH parameters (1024-bit)
        # ssl_dhparam /etc/nginx/certs/dhparam-weak.pem;

        # No OCSP stapling
        ssl_stapling off;

        location / {
            proxy_pass http://vuln-app:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
