version: "3.9"

services:
  # Vulnerable application server (BM-01 through BM-08, BM-10)
  vuln-app:
    build:
      context: ./servers
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # BM-09: Weak TLS proxy (TLS 1.0/1.1, RC4, no PFS)
  nginx-weak:
    image: nginx:1.27-alpine
    ports:
      - "9443:9443"
    volumes:
      - ./nginx/nginx-weak.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      vuln-app:
        condition: service_healthy

  # NC-04: Strong TLS proxy (TLS 1.3, AEAD, HSTS)
  nginx-strong:
    image: nginx:1.27-alpine
    ports:
      - "9444:9444"
    volumes:
      - ./nginx/nginx-strong.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      vuln-app:
        condition: service_healthy
